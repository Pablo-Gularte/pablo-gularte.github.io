<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grilla de estudiantes de sexto grado de la escuela Rosario Vera Peñaloza</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Bootstrap Table -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/bootstrap-table.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/sticky-header/bootstrap-table-sticky-header.css">
</head>

<body class="bg-primary-subtle" data-bs-theme="light">
    <header class="text-center text-bg-info mb-3 pt-3 border-bottom border-3 border-primary">
        <section>
            <h1>Grilla de estudiantes de sexto grado</h1>
            <h6>Corresponde a las cuatro secciones de ambos turnos de la escuela Rosario Vera Peñaloza</h6>
        </section>
    </header>
    <main class="container-fluid">
        <div class="row">
            <!-- Contenedor del menú desplegable de selección de grados -->
            <div class="col">
                <!-- Menú desplegable para seleccionar el grado a visualizar -->
                <div class="dropdown d-inline mt-2"></div>
            </div>

            <!-- Panel de visualización de tareas semanales -->
            <div class="col-8">
                <div class="card shadow-sm border-secondary">
                    <div class="card-header bg-secondary text-white py-1 px-2">
                        <a class="text-light text-decoration-none d-block" data-bs-toggle="collapse"
                            href="#panelTareasSemana" role="button" aria-expanded="false"
                            aria-controls="collapseExample">
                            <small class="fw-bold"><i class="bi bi-list-task"></i> Actividades de la Semana</small>
                        </a>
                    </div>
                    <div id="panelTareasSemana" class="collapse show bg-warning-subtle">
                        <table id="tablaPanelTareasSemana" class="table table-sm table-striped table-bordered">
                            <thead>
                                <tr>
                                    <th id="leyendaSemana" colspan="4" class="text-bg-warning text-center">Semana del xx al xx</th>
                                </tr>
                                <tr class="text-center">
                                    <th class="text-bg-warning">Día</th>
                                    <th class="text-bg-warning">TM</th>
                                    <th class="text-bg-warning">TT</th>
                                    <th class="text-bg-warning">Almuerzo</th>
                                </tr>
                            </thead>
                            <tbody class="table-warning">
                            </tbody>
                        </table>
                        <!-- Contenedor del botones de agenda educativa y feriados -->
                        <div class="d-flex justify-content-center">
                            <div class="btn-group" role="group" aria-label="Botonera de datos">
                                <!-- Botón agenda escolar del mes -->
                                <button id="btn-agenda" type="button" class="btn btn-outline-primary mb-1"
                                    data-bs-toggle="modal" data-bs-target="#agenda">
                                    <i class="bi bi-journal-check"></i> Ver agenda educativa
                                </button>
    
                                <!-- Botón feriados nacionales -->
                                <button id="btn-feriados" type="button" class="btn btn-outline-primary mb-1"
                                    data-bs-toggle="modal" data-bs-target="#feriados">
                                    <i class="bi bi-calendar-event"></i> Ver feriados
                                </button>
    
                                <button id="btn-almuerzo" type="button" class="btn btn-outline-primary mb-1"
                                    data-bs-toggle="modal" data-bs-target="#almuerzos">
                                    <i class="bi bi-fork-knife"></i> Almuerzos
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contenedor de selector de modo oscuro -->
            <div class="col">
                <!-- Selector de tema claro/oscuro -->
                <div class="form-check form-switch float-end me-3">
                    <input class="form-check-input" type="checkbox" id="themeSwitch">
                    <label class="form-check-label text-dark" for="themeSwitch">Modo oscuro</label>
                </div>
            </div>
        </div>

        <!-- Table de estudiantes -->
        <h3 id="titulo-grado"></h3>
        <table id="estudiantes" class="table table-bordered table-hover table-striped"></table>

        <!-- ---------------------------------------------------- -->
        <!-- Sección para alojar los respectivos Modal de botones -->
        <!-- ---------------------------------------------------- -->
        <!-- Modal agenda escolar del mes -->
        <div id="agenda" class="modal fade" tabindex="-1" aria-labelledby="agendaLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header text-light bg-success">
                        <h5 id="mes-agenda"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body bg-success-subtle">
                        <table id="tabla-agenda" class="table table-bordered table-striped"></table>
                    </div>
                    <div class="modal-footer bg-success-subtle">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal feriados nacionales -->
        <div id="feriados" class="modal fade" tabindex="-1" aria-labelledby="feriadosLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header text-light bg-success">
                        <h5>Feriados nacionales del mes en curso</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body bg-success-subtle">
                        <table id="tabla-feriados" class="table table-bordered table-striped"></table>
                    </div>
                    <div class="modal-footer bg-success-subtle">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de almuerzos -->
        <div id="almuerzos" class="modal fade" tabindex="-1" aria-labelledby="almuerzosLabel" aria-hidden="true">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <div class="modal-header text-light bg-success">
                        <h5>Menú semanal de almuerzos</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body bg-success-subtle">
                        <img src="img/menuGeneral.jpg" class="img-fluid rounded mx-auto d-block"
                            alt="grilla de almuerzos">
                    </div>
                    <div class="modal-footer bg-success-subtle">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

    </main>
    <footer>
        <h6></h6>
    </footer>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <!-- Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Bootstrap Table -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/bootstrap-table.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/bootstrap-table-locale-all.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/sticky-header/bootstrap-table-sticky-header.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/print/bootstrap-table-print.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/export/bootstrap-table-export.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin@1.29.0/tableExport.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin@1.29.0/libs/jsPDF/jspdf.umd.min.js"></script>
    <!-- Bootstrap 3 Typeahead -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-3-typeahead@4.0.2/bootstrap3-typeahead.min.js"
        integrity="sha256-LOnFraxKlOhESwdU/dX+K0GArwymUDups0czPWLEg4E=" crossorigin="anonymous"></script>

    <!-- Rutinas propias -->
    <script src="rutinas.js"></script>
</body>

</html>
