<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Página de la Rosarito</title>

    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Bootstrap-Table -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.3/dist/bootstrap-table.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.3/dist/extensions/sticky-header/bootstrap-table-sticky-header.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css"
        integrity="sha256-YKKnn5oXErZthQwr01oz4mEVF11gcVMJYcmUuhoyUgM=" crossorigin="anonymous">
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span>
                    <picture>
                        <source srcset="img/RosarioVeraPenalozaSinFondo.png" type="image/png">
                        <img src="img/RosarioVeraPenalozaSinFondo.png" alt="Rosario Vera Peñaloza" class="img-fluid"
                            width="75px">
                    </picture>
                </span>Página de la Rosarito
            </div>

            <button class="hamburger" id="hamburger-btn">☰</button>

            <ul class="nav-menu" id="nav-menu">
            </ul>

            <div class="controls">
                <button class="theme-toggle" id="theme-btn" data-theme="light">Modo</button>
            </div>
        </div>
    </nav>

    <aside class="reminder-panel" id="reminder-panel">
        <div class="panel-header">
            <span>📅 TAREAS SEMANALES</span>
            <button class="close-panel-btn" onclick="togglePanel(true)">✕</button>
        </div>
        <div class="panel-content">
            <div class="reminder-item">📌 Cargar notas 6to B - Historia</div>
            <div class="reminder-item">📌 Reunión de padres (Jueves 14hs)</div>
            <div class="reminder-item">📌 Revisar asistencias mes Mayo</div>
        </div>
    </aside>

    <button class="reopen-panel-btn" id="reopen-btn" onclick="togglePanel(false)">🔔</button>

    <main>
        <h1 id="view-title">¡Hola Zory!</h1>
        <p id="view-desc">Seleccioná un grado en la parte superior para comenzar a gestionar.</p>

        <div id="action-menu" style="display:none; gap:10px; margin-top:20px;">
            <button class="grade-btn">📋 Listado Estudiantes</button>
            <button class="grade-btn">📝 Gestionar Notas</button>
            <button class="grade-btn">🗓️ Asistencias</button>
            <button class="grade-btn">🕒 Horarios</button>
        </div>

        <!-- Tabla dinámica con datos de estudiantes del grado seleccionado -->
        <div class="container-fluid mt-4" id="contenedor-tabla-estudiantes" style="display: none;">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-success mb-3" id="titulo-tabla">Listado General</h5>
                    <!-- Tabla de estudiantes generada dinámicamente -->
                    <table id="tabla-estudiantes">
                    </table>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <h6>Acá va el pié de página</h6>
    </footer>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"
        integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <!-- Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Popper + TippyJS -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"
        integrity="sha256-dQbI9NheRwerRvmFjwxuZeMxa50vEi3PSFudvznVp6w=" crossorigin="anonymous"></script>
    <!-- Bootstrap-Table -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.3/dist/bootstrap-table.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.3/dist/bootstrap-table-locale-all.min.js"></script>
    <!-- Extensiones Bootstrap-Table -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.3/dist/extensions/sticky-header/bootstrap-table-sticky-header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/print/bootstrap-table-print.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.27.0/dist/extensions/export/bootstrap-table-export.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin@1.29.0/tableExport.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tableexport.jquery.plugin@1.29.0/libs/jsPDF/jspdf.umd.min.js"></script>
    <!-- Bootstrap 3 Typeahead -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-3-typeahead@4.0.2/bootstrap3-typeahead.min.js" integrity="sha256-LOnFraxKlOhESwdU/dX+K0GArwymUDups0czPWLEg4E=" crossorigin="anonymous"></script>
    <!-- Rutinas propias -->
    <script src="js/nuevaVersion.js"></script>
</body>

</html>
