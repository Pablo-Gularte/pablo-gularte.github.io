<!DOCTYPE html>
<html lang="es-AR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstarp Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css"
        integrity="sha256-YKKnn5oXErZthQwr01oz4mEVF11gcVMJYcmUuhoyUgM=" crossorigin="anonymous">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <script>
        // Bloque de detección inmediata para evitar parpadeos
        const savedTheme = localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>

    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold" href="#">
                <i class="bi bi-leaf-fill"></i> EcoSystem
            </a>
            <button class="btn btn-outline-primary btn-sm d-flex align-items-center gap-2" id="themeToggler">
                <i class="bi bi-sun-fill d-block-light" id="themeIcon"></i>
                <span>Tema</span>
            </button>
        </div>
    </nav>

    <main class="container mt-5">
        <article id="panel"></article>
    </main>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <!-- Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"
        integrity="sha256-dQbI9NheRwerRvmFjwxuZeMxa50vEi3PSFudvznVp6w=" crossorigin="anonymous"></script>

    <!-- Rutinas personalizadas -->
    <script src="js/rutinas.js"></script>
    <script>
        // Script simple para alternar el tema de Bootstrap
        const toggler = document.getElementById('themeToggler');
        toggler.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-bs-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', target);
        });
    </script>
</body>

</html>
